<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Even/Odd Checker</title>
    <script>
        function checkNumber() {
            
            let val = document.getElementById("userInput").value;
            let num = parseInt(val);

            
            if (isNaN(num)) {
                document.getElementById("result").innerText = "Please enter a valid number.";
                return;
            }

            
            if (num % 2 === 0) {
                document.getElementById("result").innerText = num + " is Even";
            } else {
                document.getElementById("result").innerText = num + " is Odd";
            }
        }
    </script>
</head>
<body>
    <h2>Even/Odd Checker</h2>
    <input type="number" id="userInput" placeholder="Enter a number">
    <button onclick="checkNumber()">Check</button>
    <p id="result"></p>
</body>
</html>
