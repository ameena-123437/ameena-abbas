<!DOCTYPE html>
<html>
<body>

<h2>Item List</h2>
<ul id="list"></ul>

<script>
let items = ["Television", "Mobile", "Radio"];

let list = document.getElementById("list");

items.forEach(item => {
    let li = document.createElement("li");
    li.textContent = item;
    list.appendChild(li);
});
</script>

</body>
</html>
